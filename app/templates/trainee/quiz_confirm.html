{% extends "base.html" %}
{% block title %}Почати тест — {{ quiz.title }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="text-center p-10 rounded-2xl"
         style="background: var(--color-surface); border: 1px solid var(--color-border); box-shadow: var(--shadow-md);">
        <div class="text-5xl mb-4">🔁</div>
        <h1 class="text-xl font-bold mb-2"
            style="font-family: var(--font-display); color: var(--color-text);">
            {{ quiz.title }}
        </h1>

        <p class="text-sm mb-2" style="color: var(--color-text-muted);">Ви вже проходили цей тест і отримали</p>
        <p class="text-3xl font-extrabold mb-1"
           style="font-family: var(--font-display);
                  color: {% if pct >= 80 %}var(--color-success){% elif pct >= 60 %}var(--color-primary){% else %}var(--color-accent){% endif %};">
            {{ score }}/{{ total }} балів — {{ pct }}%
        </p>

        <p class="text-sm mb-8" style="color: var(--color-text-muted);">Хочете спробувати ще раз?</p>

        <div class="flex gap-3 justify-center">
            <a href="/dashboard"
               class="px-6 py-2.5 rounded-xl text-sm font-semibold transition-all"
               style="border: 1.5px solid var(--color-border); color: var(--color-text);
                      background: transparent; font-family: var(--font-display);"
               onmouseover="this.style.background='var(--color-bg)'"
               onmouseout="this.style.background='transparent'">
                До списку тестів
            </a>
            <form action="/quiz/{{ quiz.id }}/start" method="post">
                <button type="submit"
                        class="px-6 py-2.5 rounded-xl text-sm font-semibold text-white transition-all"
                        style="background: var(--color-primary); font-family: var(--font-display);"
                        onmouseover="this.style.background='var(--color-primary-dark)'"
                        onmouseout="this.style.background='var(--color-primary)'">
                    Пройти ще раз
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
