{% extends "base.html" %}
{% block title %}{{ quiz.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <!-- Заголовок і прогрес -->
    <div class="mb-6">
        <h1 class="text-xl font-bold mb-3"
            style="font-family: var(--font-display); color: var(--color-text);">
            {{ quiz.title }}
        </h1>
        <div class="flex items-center gap-3">
            <span class="text-xs font-medium whitespace-nowrap" style="color: var(--color-text-muted);">
                Питання {{ progress + 1 }} з {{ total }}
            </span>
            <div class="flex-1 rounded-full h-1.5" style="background: var(--color-border);">
                <div class="h-1.5 rounded-full transition-all duration-500"
                     style="width: {{ (progress / total * 100) | int }}%;
                            background: var(--color-accent);">
                </div>
            </div>
            <span class="text-xs font-semibold" style="color: var(--color-accent);">
                {{ (progress / total * 100) | int }}%
            </span>
        </div>
    </div>

    <!-- Контейнер питання (HTMX замінює цей блок) -->
    <div id="quiz-container">
        {% include "partials/question.html" %}
    </div>
</div>
{% endblock %}
