{% extends "base.html" %}
{% block title %}Команда{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-8">
    <a href="/admin" class="text-sm font-medium hover:underline"
       style="color: var(--color-text-muted);">← Назад</a>
    <h1 class="text-3xl font-extrabold"
        style="font-family: var(--font-display); color: var(--color-text);">
        Команда
    </h1>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Список -->
    <div class="lg:col-span-2 rounded-2xl overflow-hidden overflow-x-auto"
         style="background: var(--color-surface); border: 1px solid var(--color-border); box-shadow: var(--shadow-sm);">
        <table class="w-full text-sm">
            <thead style="background: var(--color-bg); border-bottom: 2px solid var(--color-border);">
                <tr>
                    <th class="text-left px-6 py-3 font-semibold text-xs uppercase tracking-wide"
                        style="color: var(--color-text-muted);">Ім'я</th>
                    <th class="text-left px-6 py-3 font-semibold text-xs uppercase tracking-wide"
                        style="color: var(--color-text-muted);">Email</th>
                    <th class="text-left px-6 py-3 font-semibold text-xs uppercase tracking-wide"
                        style="color: var(--color-text-muted);">Роль</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr style="border-bottom: 1px solid var(--color-border);">
                    <td class="px-6 py-4 font-semibold" style="color: var(--color-text);">{{ u.name }}</td>
                    <td class="px-6 py-4" style="color: var(--color-text-muted);">{{ u.email }}</td>
                    <td class="px-6 py-4">
                        {% if u.role == 'admin' %}
                        <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-semibold"
                              style="background: #EDE9FE; color: #7C3AED;">Адміністратор</span>
                        {% else %}
                        <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-semibold"
                              style="background: #F1F5F9; color: var(--color-text-muted);">Стажер</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Форма додавання -->
    <div class="rounded-2xl p-6 h-fit"
         style="background: var(--color-surface); border: 1px solid var(--color-border); box-shadow: var(--shadow-sm);">
        <h2 class="font-bold mb-5 text-base"
            style="font-family: var(--font-display); color: var(--color-text);">
            Додати стажера
        </h2>
        <form action="/admin/users/add" method="post" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wide"
                       style="color: var(--color-text-muted);">Повне ім'я</label>
                <input type="text" name="name" required
                       class="w-full px-3 py-2.5 rounded-xl text-sm outline-none transition-all"
                       style="border: 1.5px solid var(--color-border); background: var(--color-bg);
                              font-family: var(--font-body);"
                       onfocus="this.style.borderColor='var(--color-primary)'"
                       onblur="this.style.borderColor='var(--color-border)'">
            </div>
            <div>
                <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wide"
                       style="color: var(--color-text-muted);">Корпоративний email</label>
                <input type="email" name="email" required
                       class="w-full px-3 py-2.5 rounded-xl text-sm outline-none transition-all"
                       style="border: 1.5px solid var(--color-border); background: var(--color-bg);
                              font-family: var(--font-body);"
                       onfocus="this.style.borderColor='var(--color-primary)'"
                       onblur="this.style.borderColor='var(--color-border)'">
            </div>
            <div>
                <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wide"
                       style="color: var(--color-text-muted);">Тимчасовий пароль</label>
                <input type="text" name="password" required
                       class="w-full px-3 py-2.5 rounded-xl text-sm outline-none transition-all"
                       style="border: 1.5px solid var(--color-border); background: var(--color-bg);
                              font-family: var(--font-body);"
                       onfocus="this.style.borderColor='var(--color-primary)'"
                       onblur="this.style.borderColor='var(--color-border)'">
            </div>
            <button type="submit"
                    class="w-full py-2.5 rounded-xl text-sm font-semibold text-white transition-all"
                    style="background: var(--color-primary); font-family: var(--font-display);"
                    onmouseover="this.style.background='var(--color-primary-dark)'"
                    onmouseout="this.style.background='var(--color-primary)'">
                Додати до команди
            </button>
        </form>
    </div>
</div>
{% endblock %}
